name: Check working proxies

on:
  workflow_dispatch:
  schedule:
    # Every 24 hours. With timeout-minutes: 30 this is at most about
    # 900 runner minutes in a 30-day month.
    - cron: "17 2 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: proxy-check
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Fetch and check proxies
        env:
          CONCURRENCY: "250"
          CHECK_TIMEOUT: "6"
          FETCH_TIMEOUT: "20"
          MAX_PROXIES_PER_RUN: "12000"
        run: python scripts/check_proxies.py

      - name: Show generated proxy counts
        run: |
          wc -l proxies/http.txt proxies/https.txt proxies/socks4.txt proxies/socks5.txt proxies/mixed.txt
          cat proxies/stats.json

      - name: Commit updated proxy lists
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add proxies/*.txt proxies/stats.json
          if git diff --cached --quiet; then
            echo "No proxy output changes to commit."
          else
            git commit -m "Update working proxies"
            git push
          fi
