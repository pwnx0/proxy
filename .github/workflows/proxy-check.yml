name: Check working proxies

on:
  workflow_dispatch:
  schedule:
    # Every 24 hours. With timeout-minutes: 30 this is at most about
    # 900 runner minutes in a 30-day month.
    - cron: "17 2 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: proxy-check
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Fetch and check proxies
        env:
          CONCURRENCY: "250"
          CHECK_TIMEOUT: "6"
          FETCH_TIMEOUT: "20"
          MAX_PROXIES_PER_RUN: "50000"
          MIN_SUCCESSES: "3"
          HTTP_TEST_URLS: "http://httpbin.org/ip,http://www.gstatic.com/generate_204,http://example.com"
          HTTPS_TEST_URLS: "https://api.ipify.org?format=json,https://www.gstatic.com/generate_204,https://www.cloudflare.com/cdn-cgi/trace"
          BOT_TEST_URLS: ""
        run: python -u scripts/check_proxies.py

      - name: Show generated proxy counts
        run: |
          find proxies -maxdepth 3 -type f -print | sort
          echo "Source candidate counts:"
          for file in proxies/source/http.txt proxies/source/https.txt proxies/source/socks4.txt proxies/source/socks5.txt proxies/source/mixed.txt; do
            if [ -f "$file" ]; then wc -l "$file"; else echo "0 $file (missing)"; fi
          done
          echo "Working proxy counts:"
          for file in proxies/http.txt proxies/https.txt proxies/socks4.txt proxies/socks5.txt proxies/mixed.txt; do
            if [ -f "$file" ]; then wc -l "$file"; else echo "0 $file (missing)"; fi
          done
          if [ -f proxies/stats.json ]; then cat proxies/stats.json; else echo "proxies/stats.json missing"; fi

      - name: Commit updated proxy lists
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add proxies
          git status --short
          if git diff --cached --quiet; then
            echo "No proxy output changes to commit."
          else
            git commit -m "Update working proxies"
            git push
          fi
